{% extends 'devices/base.html' %}

{% block content %}
<div class="flex justify-center mt-12">
    <div class="bg-white dark:bg-zinc-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-200 dark:border-slate-800">
        <h2 class="text-2xl font-black mb-6 text-slate-800 dark:text-white uppercase tracking-tight flex items-center gap-2">
            <span class="text-yellow-500">⚡</span> Update Configuration
        </h2>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Edit Name</label>
                <input name="name" value="{{ device.name }}" 
                    class="w-full p-3 bg-slate-50 dark:bg-zinc-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none dark:text-white transition font-mono text-sm">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Edit IP Address</label>
                <input name="ip" value="{{ device.ip_address }}" 
                    class="w-full p-3 bg-slate-50 dark:bg-zinc-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none dark:text-white transition font-mono text-sm">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Edit Device Type</label>
                <input name="type" value="{{ device.device_type }}" 
                    class="w-full p-3 bg-slate-50 dark:bg-zinc-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none dark:text-white transition font-mono text-sm">
            </div>

            <button class="mt-4 bg-gradient-to-br from-slate-800 to-black hover:from-black hover:to-slate-800 text-white w-full py-4 rounded-xl font-black tracking-widest shadow-lg transition-all active:scale-95 border border-slate-700 uppercase text-sm">
                Apply Changes
            </button>
        </form>
        
        <div class="mt-4 text-center">
            <a href="/" class="text-xs text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 underline">Cancel and return to dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
