<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NetManager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind configuration for class-based dark mode
        tailwind.config = {
            darkMode: 'class',
        }

        // Theme Toggle Logic
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        }

        // On page load, apply the saved theme
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>

<body class="bg-gray-100 dark:bg-zinc-950 transition-colors duration-300 min-h-screen">

<nav class="bg-gradient-to-r from-slate-900 via-slate-800 to-black p-4 text-white flex justify-between items-center shadow-xl border-b border-slate-700">
    <div class="flex items-center gap-4">
        <h1 class="font-black text-xl tracking-tighter uppercase italic">Net<span class="text-emerald-500">Manager</span></h1>
    </div>

    <div class="flex items-center space-x-6">
        <div class="space-x-4 font-medium text-sm">
            <a href="/" class="hover:text-emerald-400 transition">Dashboard</a>
            <a href="/add/" class="hover:text-emerald-400 transition">Add Device</a>
            <a href="/lookup/" class="hover:text-emerald-400 transition">IP Lookup</a>
        </div>
        
        <div class="flex items-center gap-2 border-l border-slate-700 pl-4">
            <button onclick="toggleTheme()" class="p-2 hover:bg-slate-700 rounded-full transition" title="Toggle Dark Mode">
                🌓
            </button>
            <button onclick="location.reload()" class="p-2 hover:bg-slate-700 rounded-full transition">🔄️</button>
        </div>
    </div>
</nav>

<div class="p-6">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
